workflows:
  ios-workflow:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Ezgi
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.vinylspinner.collect
      flutter: 3.24.5
      xcode: 16.2
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          cd $CM_BUILD_DIR
          flutter packages pub get
      - name: Pod install
        script: |
          cd $CM_BUILD_DIR/ios
          pod install --repo-update
      - name: Fix BoringSSL-GRPC compiler flag
        script: |
          cd $CM_BUILD_DIR/ios
          find Pods -name "*.xcconfig" -exec sed -i '' 's/-GCC_WARN_INHIBIT_ALL_WARNINGS//g' {} +
      - name: Set up code signing
        script: |
          cd $CM_BUILD_DIR/ios
          xcode-project use-profiles
      - name: Build iOS
        script: |
          cd $CM_BUILD_DIR
          flutter build ios --release --no-codesign \
            --build-name=1.0.0 \
            --build-number=$PROJECT_BUILD_NUMBER
      - name: Archive
        script: |
          cd $CM_BUILD_DIR/ios
          xcode-project build-ipa \
            --workspace Runner.xcworkspace \
            --scheme Runner \
            --archive-flags="-destination 'generic/platform=iOS'"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
