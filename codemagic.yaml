workflows:
  ios-workflow:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Ezgi
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.vinylspinner.collect
      flutter: 3.24.5
      xcode: 16.2
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          cd $CM_BUILD_DIR
          flutter packages pub get
      - name: Set up code signing
        script: |
          cd $CM_BUILD_DIR/ios
          xcode-project use-profiles
      - name: Build iOS
        script: |
          cd $CM_BUILD_DIR
          flutter build ios --release --no-codesign \
            --build-name=1.0.0 \
            --build-number=$PROJECT_BUILD_NUMBER
      - name: Archive
        script: |
          cd $CM_BUILD_DIR/ios
          xcode-project build-ipa \
            --workspace Runner.xcworkspace \
            --scheme Runner \
            --archive-flags="-destination 'generic/platform=iOS'"
      - name: Find IPA
        script: |
          echo "Looking for IPA files..."
          find $CM_BUILD_DIR -name "*.ipa" -type f 2>/dev/null
          echo "---"
          ls -la $CM_BUILD_DIR/build/ios/ipa/ 2>/dev/null || echo "No IPA in build/ios/ipa/"
          ls -la $CM_BUILD_DIR/ios/build/ios/ipa/ 2>/dev/null || echo "No IPA in ios/build/ios/ipa/"
    artifacts:
      - build/ios/ipa/*.ipa
      - "**/*.ipa"
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
