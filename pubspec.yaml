name: spinner
description: Vinyl Value & Collection
publish_to: 'none'
version: 1.0.5+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.2.0

  # Scanner
  mobile_scanner: ^5.1.1
  google_mlkit_text_recognition: ^0.13.0
  image_picker: ^1.1.2

  # Storage
  sqflite: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  path_provider: ^2.1.2

  # Network
  dio: ^5.4.3+1
  cached_network_image: ^3.3.1

  # Monetization
  purchases_flutter: ^8.0.0

  # Attribution & analytics SDKs
  adjust_sdk: ^5.6.0
  app_tracking_transparency: ^2.0.6
  scatesdk_flutter: ^0.4.29

  # Notifications
  flutter_local_notifications: ^17.0.0

  # Background
  workmanager: ^0.5.2

  # Audio
  just_audio: ^0.9.39

  # Charts
  fl_chart: ^0.68.0

  # UI
  google_fonts: ^6.1.0

  # URL
  url_launcher: ^6.2.5

  # OAuth in-app browser (Discogs auth callback)
  flutter_web_auth_2: ^3.1.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/onboarding/
